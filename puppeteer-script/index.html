<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>opengraph-images</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      main {
        width: 1000px;
        height: 500px;
        display: grid;
        place-items: center;
        color: hsl(44, 30%, 17%);
        background: hsl(41, 100%, 97%);
        padding: 2rem;
      }

      main > svg {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      document.body.innerHTML = `<main>
      <svg viewBox="-200 -75 250 125">
        <g transform="translate(-2 -1)">
          <circle r="28" fill="#ffdb47" />
        </g>

        <g transform="translate(-1 -0.5)">
          <g fill="none" stroke="#ffdb47" stroke-width="3" stroke-linecap="round">
          ${Array(24)
            .fill()
            .map(
              (_, i, { length }) =>
                `<path transform="rotate(${(360 / length) * i})" d="M 35 0 h ${
                  i % 2 === 0 ? 7 : 6
                }" />`
            )
            .join("")}
          </g>
        </g>

        <g transform="translate(-6 -3.5)">
          <g fill="#ff877a">
            <g transform="translate(-9 5)">
              <circle r="4" />
            </g>
            <g transform="translate(9 5)">
              <circle r="4" />
            </g>
            <g transform="translate(0 6)">
              <g transform="scale(1.5)"> 
                <g
                  stroke="#ff877a"
                  stroke-width="2"
                  stroke-linejoin="round"
                  stroke-linecap="round"
                >
                  <path d="M -1.5 0 v 1.5 a 1.5 1.5 0 0 0 3 0 v -1.5z" />
                </g>
              </g>
            </g>
          </g>
        </g>

        <g transform="translate(-7 -3.5)">
          <g fill="#38311e" stroke="#ffdb47" stroke-width="1">
            <g transform="translate(-5 0)">
              <circle r="2" />
            </g>
            <g transform="translate(5 0)">
              <circle r="2" />
            </g>
          </g>
        </g>

        <g>
          ${[
            '<svg viewBox="-50 -50 100 100" width="12" height="12" x="-6" y="-6"><g fill="currentColor" stroke="none"><path d="M-40.002-50l5.004 85L.001 50.001l34.998-15.003L40.003-50h-80.007zm14.003 17.5h52l-.65 11.049h-39.649l.651 11.054H24.7L22.751 22.75 0 32.503l-22.75-9.752-.65-11.05h11.049l.325 5.525 12.026 5.2 12.026-5.2.977-16.574H-24.05L-25.998-32.5z"/></g></svg>',
            '<svg viewBox="-50 -50 100 100" width="12" height="12" x="-6" y="-6"><g fill="currentColor" stroke="currentColor" stroke-width="8"><path d="M 0 0 v 36 a 5 5 0 0 1 0 10 5 5 0 0 1 0 -10 v -72 a 5 5 0 0 1 0 -10 5 5 0 0 1 0 10" /><path transform="rotate(45)" d="M 0 0 v 36 a 5 5 0 0 1 0 10 5 5 0 0 1 0 -10 v -72 a 5 5 0 0 1 0 -10 5 5 0 0 1 0 10" /><path transform="rotate(90)" d="M 0 0 v 36 a 5 5 0 0 1 0 10 5 5 0 0 1 0 -10 v -72 a 5 5 0 0 1 0 -10 5 5 0 0 1 0 10" /><path transform="rotate(135)" d="M 0 0 v 36 a 5 5 0 0 1 0 10 5 5 0 0 1 0 -10 v -72 a 5 5 0 0 1 0 -10 5 5 0 0 1 0 10" /></g></svg>',
            '<svg viewBox="-50 -50 100 100" width="11" height="11" x="-5.5" y="-5.5"><g fill="currentColor" stroke="none"><path d="M-50-50V50.8h38.4c-8.88 0-16.08-7.2-16.08-16.08v-5.04h10.08v5.04c0 3.36 2.64 6 6 6s6-2.64 6-6V.88H4.48v33.84c0 8.88-7.2 16.08-16.08 16.08H9.52V40.72H24.64c2.88 0 5.04-2.208 5.04-5.04s-2.184-5.04-5.04-5.04c-8.4 0-15.12-6.72-15.12-15.12S16.24.4 24.64.4h13.2v10.08h-13.2c-2.88 0-5.04 2.208-5.04 5.04s2.184 5.04 5.04 5.04c8.4 0 15.12 6.72 15.12 15.12S33.04 50.8 24.64 50.8h24V-50h-100.8z"/></g></svg>',
            '<svg viewBox="-50 -50 100 100" width="12" height="12" x="-6" y="-6"><g transform="rotate(-30)"><g fill="none" stroke="currentColor" stroke-width="10" stroke-linejoin="round" stroke-linecap="round"><path d="M 30 -10 h -30 h 8 a 21 21 0 0 1 0 42 h -37 a 21 21 0 0 1 0 -42" /><path transform="scale(-1 -1)" d="M 30 -10 h -30 h 8 a 21 21 0 0 1 0 42 h -37 a 21 21 0 0 1 0 -42" /></g></g></svg>',
            '<svg viewBox="-50 -50 100 100" width="12" height="12" x="-6" y="-6"><g fill="currentColor" stroke="none"><path d="M-40.002-50l5.005 85.002 35 15.002 35.001-15.002L40.01-50h-80.002zM-26-32.5h52.002l-3.25 55.263L0 32.516l-22.75-9.753-.651-11.05h11.05l.325 5.524 12.027 5.2 12.026-5.2.977-16.574h-37.049l-.646-11.05h38.358l.65-11.055h-39.643l-.65-11.05z"/></g></svg>',
          ]
            .map(
              (icon, i, { length }) => `<g transform="rotate(${
                (50 / length) * i
              }) translate(${i % 2 === 0 ? -80 : -105} 0) rotate(${
                (50 / length) * i * -1
              })">
            ${icon}
          </g>`
            )
            .join("")}
        </g>
      </svg>
      </main>
      `;
    </script>
  </body>
</html>
